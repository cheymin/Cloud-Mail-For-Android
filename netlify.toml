[build]
  functions = "netlify/functions"
  publish = "public"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/proxy/*"
  to = "/.netlify/functions/proxy/:splat"
  status = 200

[[redirects]]
  from = "/subscribe"
  to = "/.netlify/functions/proxy/subscribe"
  status = 200

[[redirects]]
  from = "/config"
  to = "/.netlify/functions/proxy/config"
  status = 200

[[redirects]]
  from = "/register"
  to = "/.netlify/functions/proxy/register"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
