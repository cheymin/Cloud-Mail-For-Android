name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate release signing key
        run: |
          keytool -genkeypair -v \
            -keystore ${{ github.workspace }}/android/app/release.keystore \
            -alias cloudmail \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass cloudmail123 \
            -keypass cloudmail123 \
            -dname "CN=Cloud Mail, OU=Cloud Mail, O=Cloud Mail, L=Beijing, ST=Beijing, C=CN"

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Build Release APK
        env:
          SIGNING_KEYSTORE_FILE: ${{ github.workspace }}/android/app/release.keystore
          SIGNING_KEYSTORE_PASSWORD: cloudmail123
          SIGNING_KEY_ALIAS: cloudmail
          SIGNING_KEY_PASSWORD: cloudmail123
        run: flutter build apk --release

      - name: Verify APKs
        run: |
          ls -la build/app/outputs/apk/debug/
          ls -la build/app/outputs/apk/release/

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/apk/release/

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: android/app/release.keystore

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: artifacts/

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: artifacts/

      - name: Download keystore
        uses: actions/download-artifact@v4
        with:
          name: release-keystore
          path: artifacts/

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Cloud Mail App v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Cloud Mail App v${{ steps.get_version.outputs.VERSION }}

            ### ✨ 功能特性
            - 📧 基于 Cloud Mail API 的邮件管理客户端
            - 📥 邮件列表查询（收件 / 发件 / 全部）
            - 🔐 用户登录认证（Token 生成）
            - 👥 添加新用户
            - 🔄 下拉刷新 + 上拉加载更多
            - 🔍 模糊搜索邮件
            - 🎨 精美 Material Design 界面

            ### 🎯 技术亮点
            - Flutter 跨平台构建
            - Provider 状态管理
            - Dio 网络请求
            - 本地缓存 SharedPreferences

            ### 📦 下载说明
            - `app-debug.apk` - Debug 版本（已签名，可直接安装）
            - `app-release.apk` - Release 正式版（已签名，推荐安装）
            - `release.keystore` - 签名证书文件

            ### 🔑 签名信息
            - Keystore 密码: `cloudmail123`
            - Key 别名: `cloudmail`
            - Key 密码: `cloudmail123`

            ### 🚀 使用方法
            1. 下载 `app-release.apk` 到 Android 设备
            2. 允许安装未知来源应用
            3. 安装并打开应用
            4. 输入 Cloud Mail 服务器地址（如 `https://your-domain.com/`）
            5. 使用管理员邮箱和密码登录
          draft: false
          prerelease: false
          files: |
            artifacts/app-debug.apk
            artifacts/app-release.apk
            artifacts/release.keystore
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}