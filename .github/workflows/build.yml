name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode release signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/android/app/release.keystore
            echo "Using keystore from GitHub Secrets"
          else
            echo "No keystore secret found, using default embedded keystore"
            echo "" | base64 -d > ${{ github.workspace }}/android/app/release.keystore
          fi

      - name: Build Release APK
        env:
          SIGNING_KEYSTORE_FILE: ${{ github.workspace }}/android/app/release.keystore
          SIGNING_KEYSTORE_PASSWORD: cloudmail123
          SIGNING_KEY_ALIAS: cloudmail
          SIGNING_KEY_PASSWORD: cloudmail123
        run: flutter build apk --release

      - name: Verify APK
        run: ls -la build/app/outputs/apk/release/

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/apk/release/

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: artifacts/

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Cloud Mail App v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 🚀 更新内容 v4.5.4

            - 翻译功能接入 LibreTranslate 免费公共 API，无需配置即可翻译
            - 翻译优先级：LibreTranslate（免费）→ AI 翻译（需配置 API Key）→ 提示错误
            - 即使没配置 AI API Key，也能用翻译功能了！

            ## 📦 下载

            - `app-release.apk` - 正式版（已签名，推荐安装）

            ## 💡 使用方法
            1. 下载 `app-release.apk` 到 Android 设备
            2. 允许安装未知来源应用
            3. 安装并打开应用
            4. 输入 Cloud Mail 服务器地址
            5. 使用邮箱和密码登录
          draft: false
          prerelease: false
          files: |
            artifacts/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
